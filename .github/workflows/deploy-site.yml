name: Site CI

on:
  pull_request:
    paths:
      - "site/**"
      - "assets/sync-worktrees-demo-optimized.gif"
      - "README.md"
      - ".github/workflows/deploy-site.yml"
  push:
    branches: [main]
    paths:
      - "site/**"
      - "assets/sync-worktrees-demo-optimized.gif"
      - "README.md"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build
        working-directory: site
        env:
          SITE_URL: https://sync-worktrees.com
          PUBLIC_POSTHOG_KEY: ${{ secrets.PUBLIC_POSTHOG_KEY }}
          PUBLIC_POSTHOG_HOST: ${{ vars.PUBLIC_POSTHOG_HOST || 'https://eu.i.posthog.com' }}
        run: npm run build
