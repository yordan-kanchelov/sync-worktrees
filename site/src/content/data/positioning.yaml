main:
  heroHeadlineLine1: "Keep every branch checked out."
  heroHeadlineLine2: "For you and your AI agents."
  heroSubhead: "turns every Git branch, in every repo, into a folder on disk — auto-synced with the remote. `cd` instead of stashing, `grep -r` across repos, and your AI agents see the whole workspace over MCP."
  heroDiskNote: "Git history is stored once and shared — each extra branch costs only its working files, not another clone."
  metaTitle: "sync-worktrees — Keep every branch checked out. For you and your AI agents."
  metaDescription: "Keep every Git branch across every repo checked out as a folder you can cd into — auto-synced with the remote and exposed to your AI agents over MCP. No stashing, no re-cloning, no re-explaining your codebase to Claude Code, Cursor, Codex, or Windsurf."
  ogImageAlt: "sync-worktrees — keep every branch checked out, for you and your AI agents."
  ctaHeadline: "Every branch, checked out and current. From one config."
  ctaSubhead: "Point it at your repos. Stop paying the branch-switching tax."
  llmsSummary: "A workspace orchestrator for humans and AI agents. Keeps every Git branch across every repo you work on checked out as a stable directory, automatically synced with the remote, and exposed over MCP so AI coding assistants can navigate the workspace without re-orientation."
  llmsFullIntro: "This file is the plain-text companion to https://sync-worktrees.com — designed for LLM crawlers and training pipelines. It contains the landing-page hero copy, problem statement, feature descriptions, MCP configuration snippets for every supported AI tool, the full FAQ, and the canonical README in that order."
